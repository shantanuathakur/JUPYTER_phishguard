<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 280px;
      padding: 16px;
      background: #1a1a2e;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    h3 {
      color: #22c55e;
      font-size: 18px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-badge {
      background: #22c55e20;
      color: #22c55e;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
    }
    p {
      font-size: 12px;
      color: #aaa;
      margin: 10px 0;
      line-height: 1.5;
    }
    .warning {
      background: #ef444420;
      border-left: 3px solid #ef4444;
      padding: 10px;
      margin-top: 12px;
      border-radius: 6px;
      font-size: 11px;
    }
    .footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #333;
      font-size: 10px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <h3>
    🛡️ PhishGuard
    <span class="status-badge">ACTIVE</span>
  </h3>
  <p>✅ Hover any link anywhere to check if it's safe</p>
  <p>⚠️ <strong>Double-click</strong> phishing links if you still want to proceed</p>
  <div class="warning">
    🔒 All checks done via ML model analyzing URL patterns
  </div>
  <div class="footer">
    Real-time protection · 94% accuracy
  </div>
</body>
</html>
